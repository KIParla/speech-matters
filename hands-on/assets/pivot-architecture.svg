<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'IBM Plex Mono','Courier New',monospace">

  <defs>
    <!-- bidirectional arrowhead: gold -->
    <marker id="ah-end-bi" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c8b560"/>
    </marker>
    <marker id="ah-start-bi" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c8b560"/>
    </marker>
    <!-- one-way arrowhead: muted blue -->
    <marker id="ah-end-one" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 9 3.5, 0 7" fill="#7eb8c9"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="800" height="500" fill="#0e0f11"/>

  <!-- ── BIDIRECTIONAL spokes (gold, solid) ── -->

  <!-- center ↔ ELAN .eaf (top) -->
  <line x1="400" y1="203" x2="400" y2="109"
        stroke="#c8b560" stroke-width="2" opacity="0.9"
        marker-start="url(#ah-start-bi)" marker-end="url(#ah-end-bi)"/>

  <!-- center ↔ CoNLL-U (top-right) -->
  <line x1="496" y1="218" x2="573" y2="193"
        stroke="#c8b560" stroke-width="2" opacity="0.9"
        marker-start="url(#ah-start-bi)" marker-end="url(#ah-end-bi)"/>

  <!-- ── ONE-WAY spokes (muted blue, dashed) ── -->

  <!-- center → .vert/CWB (bottom-right) -->
  <line x1="470" y1="270" x2="519" y2="350"
        stroke="#7eb8c9" stroke-width="1.5" opacity="0.75" stroke-dasharray="5,3"
        marker-end="url(#ah-end-one)"/>

  <!-- center → Jefferson .txt (bottom-left) -->
  <line x1="330" y1="270" x2="281" y2="350"
        stroke="#7eb8c9" stroke-width="1.5" opacity="0.75" stroke-dasharray="5,3"
        marker-end="url(#ah-end-one)"/>

  <!-- center → orthographic .txt (top-left) -->
  <line x1="304" y1="218" x2="227" y2="193"
        stroke="#7eb8c9" stroke-width="1.5" opacity="0.75" stroke-dasharray="5,3"
        marker-end="url(#ah-end-one)"/>

  <!-- ── CENTER NODE ── -->
  <rect x="304" y="220" width="192" height="74" rx="5"
        fill="#1c1f26" stroke="#c8b560" stroke-width="2"/>
  <text x="400" y="245" text-anchor="middle"
        fill="#c8b560" font-size="13.5" font-weight="bold"
        font-family="'IBM Plex Sans','Helvetica Neue',sans-serif">TSV pivot format</text>
  <text x="400" y="263" text-anchor="middle"
        fill="#7eb8c9" font-size="10">version-controlled · validated</text>
  <text x="400" y="280" text-anchor="middle"
        fill="#7eb8c9" font-size="10">human + machine readable</text>

  <!-- ── NODE 1: ELAN .eaf (top) — bidirectional ── -->
  <rect x="326" y="63" width="148" height="46" rx="4"
        fill="#16181c" stroke="#c8b560" stroke-width="1.5"/>
  <text x="400" y="83" text-anchor="middle"
        fill="#e8e4d8" font-size="12">ELAN .eaf</text>
  <text x="400" y="99" text-anchor="middle"
        fill="#7a7870" font-size="10">time alignment · source</text>

  <!-- ── NODE 2: CoNLL-U (right) — bidirectional ── -->
  <rect x="573" y="170" width="148" height="46" rx="4"
        fill="#16181c" stroke="#c8b560" stroke-width="1.5"/>
  <text x="647" y="190" text-anchor="middle"
        fill="#e8e4d8" font-size="12">CoNLL-U</text>
  <text x="647" y="206" text-anchor="middle"
        fill="#7a7870" font-size="10">NLP · UD treebanks</text>

  <!-- ── NODE 3: .vert / CWB (bottom-right) — derived only ── -->
  <rect x="445" y="350" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="519" y="370" text-anchor="middle"
        fill="#e8e4d8" font-size="12">.vert / CWB</text>
  <text x="519" y="386" text-anchor="middle"
        fill="#7a7870" font-size="10">Sketch Engine · NoSkE</text>

  <!-- ── NODE 4: Jefferson .txt (bottom-left) — derived only ── -->
  <rect x="157" y="350" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="231" y="370" text-anchor="middle"
        fill="#e8e4d8" font-size="12">Jefferson .txt</text>
  <text x="231" y="386" text-anchor="middle"
        fill="#7a7870" font-size="10">conversation analysis</text>

  <!-- ── NODE 5: orthographic .txt (top-left) — derived only ── -->
  <rect x="79" y="170" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="153" y="190" text-anchor="middle"
        fill="#e8e4d8" font-size="12">orthographic .txt</text>
  <text x="153" y="206" text-anchor="middle"
        fill="#7a7870" font-size="10">readability · NLP</text>

  <!-- ── legend ── -->
  <line x1="60" y1="458" x2="110" y2="458"
        stroke="#c8b560" stroke-width="2" opacity="0.9"
        marker-start="url(#ah-start-bi)" marker-end="url(#ah-end-bi)"/>
  <text x="120" y="462" fill="#7a7870" font-size="10"
        font-family="'IBM Plex Sans','Helvetica Neue',sans-serif">bidirectional — corrections propagate back (EAF, CoNLL-U)</text>

  <line x1="60" y1="478" x2="110" y2="478"
        stroke="#7eb8c9" stroke-width="1.5" opacity="0.75" stroke-dasharray="5,3"
        marker-end="url(#ah-end-one)"/>
  <text x="120" y="482" fill="#7a7870" font-size="10"
        font-family="'IBM Plex Sans','Helvetica Neue',sans-serif">derived only — generated from pivot, not versioned back</text>

</svg>
