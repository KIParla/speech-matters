<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'IBM Plex Mono','Courier New',monospace">

  <defs>
    <marker id="ah-end" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c8b560"/>
    </marker>
    <marker id="ah-start" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c8b560"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="800" height="480" fill="#0e0f11"/>

  <!-- spoke: center → ELAN (top) -->
  <line x1="400" y1="240" x2="400" y2="88"
        stroke="#c8b560" stroke-width="1.6" opacity="0.75"
        marker-start="url(#ah-start)" marker-end="url(#ah-end)"/>

  <!-- spoke: center → CoNLL-U (top-right) -->
  <line x1="400" y1="240" x2="547" y2="193"
        stroke="#c8b560" stroke-width="1.6" opacity="0.75"
        marker-start="url(#ah-start)" marker-end="url(#ah-end)"/>

  <!-- spoke: center → .vert/CWB (bottom-right) -->
  <line x1="400" y1="240" x2="493" y2="370"
        stroke="#c8b560" stroke-width="1.6" opacity="0.75"
        marker-start="url(#ah-start)" marker-end="url(#ah-end)"/>

  <!-- spoke: center → Jefferson .txt (bottom-left) -->
  <line x1="400" y1="240" x2="307" y2="370"
        stroke="#c8b560" stroke-width="1.6" opacity="0.75"
        marker-start="url(#ah-start)" marker-end="url(#ah-end)"/>

  <!-- spoke: center → orthographic .txt (top-left) -->
  <line x1="400" y1="240" x2="253" y2="193"
        stroke="#c8b560" stroke-width="1.6" opacity="0.75"
        marker-start="url(#ah-start)" marker-end="url(#ah-end)"/>

  <!-- ── CENTER NODE ── -->
  <rect x="304" y="203" width="192" height="74" rx="5"
        fill="#1c1f26" stroke="#c8b560" stroke-width="2"/>
  <text x="400" y="228" text-anchor="middle"
        fill="#c8b560" font-size="13.5" font-weight="bold"
        font-family="'IBM Plex Sans','Helvetica Neue',sans-serif">TSV pivot format</text>
  <text x="400" y="246" text-anchor="middle"
        fill="#7eb8c9" font-size="10">version-controlled · validated</text>
  <text x="400" y="263" text-anchor="middle"
        fill="#7eb8c9" font-size="10">human + machine readable</text>

  <!-- ── NODE 1: ELAN .eaf (top) ── -->
  <rect x="326" y="63" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="400" y="83" text-anchor="middle"
        fill="#e8e4d8" font-size="12">ELAN .eaf</text>
  <text x="400" y="99" text-anchor="middle"
        fill="#7a7870" font-size="10">time alignment</text>

  <!-- ── NODE 2: CoNLL-U (top-right) ── -->
  <rect x="473" y="170" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="547" y="190" text-anchor="middle"
        fill="#e8e4d8" font-size="12">CoNLL-U</text>
  <text x="547" y="206" text-anchor="middle"
        fill="#7a7870" font-size="10">NLP · UD treebanks</text>

  <!-- ── NODE 3: .vert / CWB (bottom-right) ── -->
  <rect x="419" y="370" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="493" y="390" text-anchor="middle"
        fill="#e8e4d8" font-size="12">.vert / CWB</text>
  <text x="493" y="406" text-anchor="middle"
        fill="#7a7870" font-size="10">Sketch Engine · NoSkE</text>

  <!-- ── NODE 4: Jefferson .txt (bottom-left) ── -->
  <rect x="233" y="370" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="307" y="390" text-anchor="middle"
        fill="#e8e4d8" font-size="12">Jefferson .txt</text>
  <text x="307" y="406" text-anchor="middle"
        fill="#7a7870" font-size="10">conversation analysis</text>

  <!-- ── NODE 5: orthographic .txt (top-left) ── -->
  <rect x="179" y="170" width="148" height="46" rx="4"
        fill="#16181c" stroke="#2a2d35" stroke-width="1.5"/>
  <text x="253" y="190" text-anchor="middle"
        fill="#e8e4d8" font-size="12">orthographic .txt</text>
  <text x="253" y="206" text-anchor="middle"
        fill="#7a7870" font-size="10">readability · NLP</text>

  <!-- ── legend ── -->
  <line x1="80" y1="448" x2="140" y2="448"
        stroke="#c8b560" stroke-width="1.4" opacity="0.75"
        marker-start="url(#ah-start)" marker-end="url(#ah-end)"/>
  <text x="150" y="452" fill="#7a7870" font-size="10">automatic conversion · corrections propagate back</text>

</svg>
