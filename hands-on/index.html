<style>
:root{
  --bg:#0e0f11;--surface:#16181c;--border:#2a2d35;
  --accent:#c8b560;--accent2:#7eb8c9;
  --text:#e8e4d8;--muted:#7a7870;--code-bg:#1c1f26;
  --font-head:'Playfair Display',Georgia,serif;
  --font-body:'IBM Plex Sans','Helvetica Neue',sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
[data-theme="light"]{
  --bg:#f5f3ef;--surface:#ffffff;--border:#ddd9d0;
  --accent:#7a6118;--accent2:#2d6e84;
  --text:#2a2825;--muted:#8a867e;--code-bg:#ede9e1;
}
[data-theme="light"] .slide pre code{color:#2d5566}
[data-theme="light"] #lightbox{background:rgba(0,0,0,.7)}
[data-theme="light"] .slide tr:hover td{background:rgba(122,97,24,.05)}
[data-theme="light"] .nav-btn:hover:not(:disabled){background:rgba(122,97,24,.07)}
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-weight:300;font-size:16px;line-height:1.6;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;height:44px;gap:16px}
#course-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:color .15s}
#course-label:hover{color:var(--accent)}
#section-tabs{display:flex;gap:2px;flex:1;justify-content:center;height:100%;align-items:stretch}
.sec-tab{background:none;border:none;color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;padding:0 14px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.sec-tab:hover{color:var(--text)}
.sec-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#right-bar{display:flex;align-items:center;gap:12px;flex-shrink:0}
#slide-counter{font-family:var(--font-mono);font-size:11px;color:var(--muted);white-space:nowrap}
#progress-bar{width:80px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
#progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .3s ease}
#stage{flex:1;display:flex;align-items:stretch;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:52px 80px 40px;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;opacity:0;transform:translateX(40px);transition:opacity .28s ease,transform .28s ease;pointer-events:none;overflow-y:auto}
.slide>*{width:100%;max-width:860px}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
@media(min-width:900px){.slide{padding:58px 100px 46px}}
.section-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:24px;font-family:var(--font-mono);flex-shrink:0}
.slide-title{background:var(--surface)}
.slide-title h1{font-family:var(--font-head);font-size:clamp(26px,3.2vw,44px);font-weight:400;line-height:1.2;color:var(--text);max-width:820px;margin-bottom:24px}
.slide-title .rule{width:56px;height:2px;background:var(--accent);margin:20px 0}
.slide-title p{font-size:14px;color:var(--muted)}
.slide-title strong{color:var(--accent2);font-weight:400}
.slide-quote{background:var(--surface)}
.slide-quote blockquote{border-left:3px solid var(--accent);padding-left:28px;margin:0 0 20px;max-width:780px}
.slide-quote blockquote p{font-family:var(--font-head);font-size:clamp(16px,1.9vw,23px);font-style:italic;color:var(--text);line-height:1.55}
.slide-quote blockquote p em{color:var(--accent);font-style:normal}
.slide h2{font-family:var(--font-head);font-size:clamp(20px,2.6vw,34px);font-weight:400;color:var(--text);margin-bottom:48px;line-height:1.25;border-bottom:0.5px solid var(--border);padding-bottom:14px;flex-shrink:0}
.slide p{font-size:clamp(13px,1.45vw,17px);line-height:1.7;color:var(--text);max-width:780px;margin-bottom:14px}
.slide p em{color:var(--accent);font-style:italic}
.slide p strong{color:var(--accent2);font-weight:500}
.slide p>em:only-child{font-size:12px;color:var(--muted);font-style:normal;font-family:var(--font-mono);display:block;margin-top:-6px;margin-bottom:14px}
.slide blockquote{border-left:3px solid var(--accent);padding-left:22px;margin:0 0 18px;max-width:780px}
.slide blockquote p{font-family:var(--font-head);font-size:clamp(13px,1.5vw,18px);font-style:italic;color:var(--text);line-height:1.5;margin-bottom:6px}
.slide blockquote p em{color:var(--accent);font-style:normal}
.slide ul,.slide ol{padding-left:20px;max-width:780px;margin-bottom:18px}
.slide li{font-size:clamp(13px,1.4vw,16px);line-height:1.7;margin-bottom:9px;color:var(--text)}
.slide li strong{color:var(--accent2);font-weight:500}
.slide li em{color:var(--accent);font-style:italic}
.slide ul li::marker{color:var(--accent)}
.slide pre{background:var(--code-bg);border:0.5px solid var(--border);border-left:3px solid var(--accent2);border-radius:6px;padding:18px 22px;margin:0 0 18px;overflow-x:auto;max-width:860px;flex-shrink:0}
.slide pre code{font-family:var(--font-mono);font-size:clamp(10px,1vw,13px);line-height:1.65;color:#a8c4cc}
.slide code:not(pre code){font-family:var(--font-mono);font-size:.87em;background:var(--code-bg);border:0.5px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--accent2)}
.slide img{max-width:100%;max-height:65vh;height:auto;display:block;margin:0 auto 18px;border-radius:4px;border:0.5px solid var(--border);cursor:zoom-in}
#lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:92vh;border-radius:6px;border:0.5px solid var(--border);box-shadow:0 8px 48px rgba(0,0,0,.7)}
.slide table{border-collapse:collapse;width:100%;max-width:860px;margin-bottom:18px;font-size:clamp(11px,1.2vw,14px)}
.slide th{background:var(--code-bg);color:var(--accent);font-weight:500;font-family:var(--font-mono);font-size:.84em;letter-spacing:.04em;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border)}
.slide td{padding:8px 13px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:top}
.slide tr:last-child td{border-bottom:none}
.slide tr:hover td{background:rgba(200,181,96,.04)}
.slide-summary h2{color:var(--accent)}
.slide-refs h2{font-size:18px;color:var(--muted)}
.slide-refs li{font-size:12px;color:var(--muted);margin-bottom:5px;line-height:1.5}
#navbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-top:0.5px solid var(--border);background:var(--surface);flex-shrink:0}
.nav-btn{background:none;border:0.5px solid var(--border);color:var(--muted);font-family:var(--font-mono);font-size:12px;padding:5px 16px;border-radius:4px;cursor:pointer;letter-spacing:.06em;transition:color .15s,border-color .15s,background .15s}
.nav-btn:hover:not(:disabled){color:var(--text);border-color:var(--accent);background:rgba(200,181,96,.06)}
.nav-btn:disabled{opacity:.22;cursor:default}

const SECTIONS = [

const HOME_TITLE = "Hands-on Speech Corpus Processing: Standardization, Automation, and GitOps for Reproducibility";

let currentSection = -1, currentSlide = 0;
let sections = [];

function parseSlides(md){return md.split(/\n---\n/).map(s=>s.trim()).filter(Boolean);}
function classify(html,idx){
  if(idx===0)return 'slide-title';
  if(html.includes('<blockquote>')&&!html.includes('<h2>'))return 'slide-quote';
  if(/Summary/.test(html))return 'slide-summary';
  if(/References/.test(html))return 'slide-refs';
  return '';
}
function buildSlide(raw,idx,si){
  const html=marked.parse(raw);
  const cls=classify(html,idx);
  const div=document.createElement('div');
  div.className='slide'+(cls?' '+cls:'');
  const chip=document.createElement('div');
  chip.className='section-label';
  chip.textContent=SECTIONS[si].chip;
  if(cls==='slide-title'){
    const tmp=document.createElement('div');tmp.innerHTML=html;
    const h1=tmp.querySelector('h1');
    div.appendChild(chip);
    if(h1)div.appendChild(h1);
    const rule=document.createElement('div');rule.className='rule';div.appendChild(rule);
    [...tmp.children].forEach(el=>div.appendChild(el));
  }else{
    div.appendChild(chip);
    const c=document.createElement('div');c.innerHTML=html;div.appendChild(c);
  }
  return div;
}
function buildHomeSlide(){
  const div=document.createElement('div');
  div.className='slide slide-home';
  div.id='slide-home';
  const t=document.createElement('h1');
  t.className='home-title';t.textContent=HOME_TITLE;
  div.appendChild(t);
  const rule=document.createElement('div');rule.className='home-rule';div.appendChild(rule);
  const ul=document.createElement('ul');ul.className='home-chapters';
  SECTIONS.forEach((sec,i)=>{
    const li=document.createElement('li');
    const num=document.createElement('span');num.className='home-ch-num';num.textContent=String(i+1).padStart(2,'0');

    li.appendChild(num);li.appendChild(title);
    li.addEventListener('click',()=>jumpSection(i));
    ul.appendChild(li);
  });
  div.appendChild(ul);
  return div;
}
async function fetchMd(file){
  try{const r=await fetch(file);if(!r.ok)throw 0;return await r.text();}
  catch{return FALLBACKS[file]||`## Coming soon\n\nThis section is not yet available.`;}
}
async function loadSection(idx){
  if(sections[idx])return;
  const md=await fetchMd(SECTIONS[idx].file);
  const stage=document.getElementById('stage');
  sections[idx]=parseSlides(md).map((raw,i)=>{
    const s=buildSlide(raw,i,idx);
    s.style.display='none';

function hideHomeSlide(){
  const h=document.getElementById('slide-home');
  if(h){h.classList.remove('active');h.style.display='none';}
}
function showHomeSlide(dir){
  hideCurrentSlide(dir);
  currentSection=-1;currentSlide=0;
  const h=document.getElementById('slide-home');
  h.style.display='';
  if(dir!==0){
    h.style.opacity='0';
    h.style.transform=dir>=0?'translateX(40px)':'translateX(-40px)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{h.style.opacity='';h.style.transform='';}));
  }
  h.classList.add('active');
  document.getElementById('slide-counter').textContent='— / —';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('btn-prev').disabled=true;
  document.getElementById('btn-next').disabled=false;
  document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));
}
function hideCurrentSlide(dir){
  if(currentSection===-1){
    const h=document.getElementById('slide-home');
    if(h){h.classList.remove('active');h.style.opacity='0';h.style.transform=dir>=0?'translateX(-40px)':'translateX(40px)';
      setTimeout(()=>{h.style.opacity='';h.style.transform='';h.style.display='none';},300);}
    return;
  }
  const cur=sections[currentSection]?.[currentSlide];
  if(cur){
    cur.classList.remove('active');cur.style.opacity='0';
    cur.style.transform=dir>=0?'translateX(-40px)':'translateX(40px)';
    setTimeout(()=>{cur.style.opacity='';cur.style.transform='';cur.style.display='none';},300);
  }
}
function showSlide(si,ii,dir){
  hideCurrentSlide(dir);
  currentSection=si;currentSlide=ii;
  const next=sections[si][ii];
  next.style.display='';
  if(dir!==0){
    next.style.opacity='0';
    next.style.transform=dir>=0?'translateX(40px)':'translateX(-40px)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{next.style.opacity='';next.style.transform='';}));
  }
  next.classList.add('active');
  const total=sections[si].length;
  document.getElementById('slide-counter').textContent=`${ii+1} / ${total}`;
  document.getElementById('progress-fill').style.width=(total>1?(ii/(total-1))*100:100)+'%';
  document.getElementById('btn-prev').disabled=false;
  document.getElementById('btn-next').disabled=si===SECTIONS.length-1&&ii===total-1;
  document.querySelectorAll('.sec-tab').forEach((t,i)=>t.classList.toggle('active',i===si));
}
async function go(delta){
  if(currentSection===-1){
    if(delta>0){await loadSection(0);showSlide(0,0,1);}
    return;
  }
  let s=currentSection,i=currentSlide+delta;
  if(i<0){
    if(s===0){showHomeSlide(-1);return;}
    s--;await loadSection(s);i=sections[s].length-1;
  }else if(i>=sections[currentSection].length){
    s++;if(s>=SECTIONS.length)return;await loadSection(s);i=0;
  }
  showSlide(s,i,delta);
}
async function jumpSection(idx){
  if(idx===currentSection)return;
  await loadSection(idx);
  const dir=currentSection===-1?1:(idx>currentSection?1:-1);
  showSlide(idx,0,dir);
}
function buildTabs(){
  const nav=document.getElementById('section-tabs');
  SECTIONS.forEach((sec,i)=>{
    const btn=document.createElement('button');
    btn.className='sec-tab';btn.textContent=sec.label;
    btn.addEventListener('click',()=>jumpSection(i));
    nav.appendChild(btn);
  });
}

  homeEl.style.display='none';

  "section1.md": `# Git as a Collaborative Environment for Multilayer Spoken Resource Development

---

## What I hope you take away

The tools and ideas in this session were not built for linguists.

They come from software engineering, and some parts may feel abstract or over-engineered for what you currently do.

That is fine.

My goal is not to convince you to adopt a full DevOps pipeline tomorrow. It is to **spark some curiosity**: to show that tools designed to manage complexity in large collaborative codebases can be repurposed to make corpus work more transparent, more reproducible, and easier to share — and that the gap between "what a software engineer does" and "what a corpus linguist needs" is smaller than it looks.

---

## Why spoken corpora are hard to manage collaboratively

> "Nothing is, in and of itself, a datum; instead, it is a datum for somebody in some perspective."
>
> — Lehmann (2004), *Data in linguistics*

In Natural Language Processing there is often an unstated assumption about the reality of the datum, spoken data confront us with the fact that every bit of information is in fact a stratification of several levels of interpretation.

---

## Human language is first and foremost spoken

- Spoken interaction is **structurally underrepresented** in language resources
- Growing interest in NLP in modelling language *in interaction* — beyond speech
- Interactional phenomena (overlaps, repairs, backchannels, disfluencies) are often treated as marginal or excluded from downstream formats

*Chrupała (2023) · Dobrovoljc (2022) · Linell (2019)*

---

## The multilayer problem

A spoken corpus is not a text.

It is a **stratification of interpretive layers**:

\`\`\`
raw audio
  └── pseudonymized audio              [GDPR pipeline]
   |    └── transcription              [ELAN / expert linguist]
   |          └── orthographic form    [normalization scripts]
   |              | └── morphosyntax   [POS tagger + manual revision]
   |              |       └── syntax   [UD treebank annotation]
   |              └──────────────── speech acts / pragmatics   [manual annotation]
   └──────────────────────────────────────────── metadata
\`\`\`

Each layer: different person · different tool · different time

Downstream exports from these layers:
- **CoNLL-U** — UD treebanks, NLP pipelines
- **Verticalized (.vert / CWB)** — NoSketchEngine, Sketch Engine, ANNIS, corpus query systems
- **Jefferson .txt / CHAT** — interactional analysis, CLAN
- **TEI-ISO 24624** — archiving and exchange

---

## KIParla: a running example

A large (~2M token) corpus of spontaneous spoken Italian

- Started in **2016**
- Built around **modularity**: new modules added with compatible metadata and transcription conventions

\`\`\`
fieldwork (many people)
    ↓
ELAN transcription  (.eaf XML)
    ↓
expert revision + pseudonymization  (one person)
    ↓
[morphosyntactic annotation  (POS tagger + manual revision)]
    ↓
linearized exports
    ├── Jefferson .txt /             [interactional analysis]
    ├── orthographic .txt            [readability, downstream NLP]
    ├── CoNLL-U                      [UD treebanks, NLP pipelines]
    └── verticalized .vert           [NoSketchEngine, Sketch Engine]
\`\`\`

*Mauri et al. (2019) · Pannitto et al. (2025)*

**The deeper problem**: many of the derived formats, tools, and pipelines were not designed with spoken interaction in mind.

They do not model:
- the **speaker** as a social agent producing situated language
- the **interactional setting** — who is talking to whom, under what circumstances
- **spoken-language specifics** — overlap, repair, prosody, turn-taking, disfluency

They were built for monological linear text, then retrofitted for spoken language and interaction.

---

## From pipeline to pivot

**Problems with the current pipeline**:

- The pipeline is a *one-way street* — it works like a cascade from transcription to downstream layers. When you work downstream, it's hard to swim upstream
- Validation is *not enforced* — annotation errors only surface when someone notices them, and it's hard to propagate corrections
- At this scale, and with a growing corpus, consistency *cannot be maintained manually* — automatic pipelines are needed
- Each undocumented shortcut, implicit modeling choice, and ad hoc format migration accumulates as **technical and conceptual debt** — making future transformations, collaboration, and reuse increasingly fragile

The linear model treats **ELAN** as the authoritative source. Every derived format is a dead end.

We argue for the introduction of a **pivot model**, which replaces the pipeline with a single maintained representation at the centre:

![Pivot architecture: TSV format at centre, derived formats around it with bidirectional conversion](assets/pivot-architecture.svg)

In the case of KIParla, the pivot is a **verticalized, pseudo-tokenized TSV** — one token per row, enriched with lexical, prosodic, interactional, and alignment features. From it, all formats are reproducibly derived by conversion scripts.

Crucially, the architecture is **bidirectional**: corrections applied at the pivot level propagate to all derived formats and vice versa (to some extent), without breaking annotation on the rest of the resource.

For this to work, the pivot format must satisfy four requirements:

- **Version-controlled** — every change is a commit; full history is preserved
- **Validated at ingestion** — well-formedness constraints enforced before any format is generated
- **Diff-able and human-readable** — inspectable with a text editor or spreadsheet, no specialist tool required
- **Extensible** — new annotation layers are added as columns, without restructuring existing data

*Pannitto & Mauri (2025)*

---

## What we wanted to build

We started with a concrete goal: annotate spoken Italian for syntax, producing UD treebanks.

Here is what a single sentence looks like — in CoNLL-U, and as a dependency tree:

\`\`\`conllu
# sent_id = BOA3017_126
# text = come nei sottotitoli
# jefferson_text = come nei sottotitoli
# speaker_id = BO146
# conversation_id = BOA3017

2-3   nei          _           _     _  _                                          _  _     _  KID=126-1

\`\`\`

![Dependency tree for "come nei sottotitoli" — tokens carry timestamps, KIParla IDs, and a cross-utterance co-construction link](assets/sent_74.svg)

The tree is not just syntax. Each node already encodes:

- **timing** (\`Begin=190.273\`, \`End=191.293\`) — where in the audio this token occurs
- **corpus ID** (\`KID=126-*\`) — linking back to the transcription
- **interactional structure** (\`Coconstruct=obl::BOA3017_120_121_123_125::31\`) — *sottotitoli* is co-constructed across speakers, completing a turn started elsewhere

![ELAN view of KPN006 — overlapping turns across three speaker tiers](assets/elan-kipn006.png)

> PKP019: \`eh (.) se no dice là si fa [c~] (.) si fa casotto\` ← short pauses, interrupted speech

> PKP014: \`[sì sì sì]\`  ← overlaps with PKP019
>

In the .eaf XML, they live **3000+ lines apart**:

\`\`\`xml
<!-- line 4630 — PKP014 -->

    TIME_SLOT_REF1="ts2522" TIME_SLOT_REF2="ts2523">

</ALIGNABLE_ANNOTATION>

    TIME_SLOT_REF1="ts356" TIME_SLOT_REF2="ts357">
  <ANNOTATION_VALUE>&gt;fa vedere&lt;</ANNOTATION_VALUE>
</ALIGNABLE_ANNOTATION>

<!-- line 7669 — PKP019 -->
<ALIGNABLE_ANNOTATION ANNOTATION_ID="a177"
    TIME_SLOT_REF1="ts352" TIME_SLOT_REF2="ts353">
  <ANNOTATION_VALUE>eh (.) se no dice là si fa [c~] (.) si fa casotto</ANNOTATION_VALUE>
</ALIGNABLE_ANNOTATION>
\`\`\`

- Temporal overlap is **not encoded** — only recoverable by cross-referencing \`ts\` IDs
- Different levels are mixed: it's not easy to decouple Jefferson notation from transcription
- Additional annotation layers are **external or tool-dependent**
- No path to add morphosyntax, prosody, or speech acts without breaking the format

---

## The invisible cost of infrastructure

> Language Resources projects often struggle not because of analytical complexity,
> but because of **fragile data workflows**, undocumented transformations,
> and ad hoc collaboration practices.

Infrastructure work is invisible — until it breaks. When it does, the cost is:

- **Information loss**: transformations that cannot be reconstructed
- **Misalignment between layers**: each format drifts independently
- **Unintelligible archives**: corpora that become opaque artifacts rather than reusable research objects

The standard response is to delegate all of this to a single technical expert.
This creates its own risk: when that person leaves, the infrastructure becomes unmaintainable.

> The alternative is **distributed computational literacy**

shared understanding of version control, transformation logic, and documentation practices across the whole team.

Not turning linguists into software engineers, but ensuring no one is left unable to navigate the systems
that sustain their own research.

---

## Why a new format?

Spoken language research is characterised **not by a lack of standards, but by the coexistence of partially incompatible ones**,
each optimised for a specific stage of the data lifecycle.

| Format              | Strength                                     | Limitation                              |
| ------------------- | -------------------------------------------- | --------------------------------------- |
| ELAN / .eaf         | Time alignment, interactional detail         | Tool-dependent, hard to diff            |
| CHAT                | Transcription conventions                    | Not designed for large-scale annotation |
| TEI-ISO 24624       | Exchange and preservation                    | Rarely used as working format           |
| CoNLL-U             | NLP pipelines, UD treebanks                  | Loses interactional structure           |
| .vert / CWB         | Corpus query (NoSketchEngine, Sketch Engine) | Flat, no layer hierarchy                |
| ISO 24617-2 (SemAF) | Speech act / dialogue act annotation         | Complex, low adoption                   |

---

## FAIR data vs FAIR processes

> "Interoperability is not achieved through adherence to formats and standards,
> but through the **alignment of curatorial practices**."
>
> — Pannitto & Mauri (2025)

- **FAIR** principles (Findable, Accessible, Interoperable, Reusable) are usually applied to *data products*
- But for living corpora, what matters is whether the **process** is FAIR
- A static release can be FAIR; an evolving corpus needs FAIR *workflows*

---

## Corpora as living artefacts

> "Dataset curation increasingly resembles a form of **continuous development**,
> rather than a linear production pipeline culminating in a static release."
>
> — Pannitto & Mauri (2025)

New data are added · Errors are corrected · Formats evolve · New reuse scenarios emerge

→ This requires **versioning**, **traceability**, and **reversibility** built into the workflow itself, and software engineering already has mature tools for exactly this.

---

## The DevOps analogy

**DevOps** (**Dev**elopment + **Op**erations) is a set of practices from software engineering that breaks down the traditional wall between the people who *write* code and the people who *deploy and maintain* it.

The combined workflow treats development as a *continuous, collaborative, and automated* process.

> every change is tracked, every build is reproducible, and quality is enforced automatically before anything reaches production.

| Software development | Corpus development                     |
| -------------------- | -------------------------------------- |
| Codebase             | Annotated corpus                       |
| Feature branch       | Annotator's working copy               |
| Code review          | Annotation adjudication                |
| CI/CD pipeline       | Validation + format conversion scripts |
| Release tag          | Corpus version (e.g. v1.1.0)           |
| Issue tracker        | Annotation guideline discussion        |

*Steiner (2017) — "A DevOps manifesto for speech corpus management"*

---

## The answer already exists

Software engineers faced the same problems decades ago (distributed teams, evolving artifacts, the need to track every change and recover from every mistake) and built tools to solve them:

- **Git** — version control: every change is a commit, every state is recoverable
- **GitHub / GitLab** — collaboration platforms: review, discussion, and automation built in
- **CI/CD** — automated pipelines: validation and conversion run on every commit, not manually

> We do not need to build new infrastructure.
> We need to apply existing infrastructure to a new domain.`,

1. *"If you have used Git before — even once — raise your hand."*
2. Form groups of 4–5, making sure each group has at least one Git-experienced person
3. The Git-experienced person **explains, does not type** — others drive the keyboard

---

## From the problem to the tool

So: often spoken corpus pipelines suffer from

- Opacity — decisions are not recorded > because it takes a lot of time to track things!
- Irreversibility — changes cannot be undone safely > how should we propagate changes to all artifacts? Better not to change anything...
- Bottlenecks — knowledge concentrated in one person > the PI often is the only one aware of the entire ecosystem
- Static releases — no clear relation between releases

---

## We have all seen this

\`\`\`
BOA1010_final.eaf
BOA1010_final_revised.eaf
BOA1010_final_revised_2.eaf
BOA1010_FINAL_USE_THIS_ONE.eaf
BOA1010_FINAL_USE_THIS_ONE_v2_corrected.eaf
BOA1010_FINAL_USE_THIS_ONE_v2_corrected_LP.eaf
\`\`\`

- Which is the authoritative version?
- Who made the \`_corrected\` changes, and why?
- Do you know exactly what changed from \`BOA1010_FINAL_USE_THIS_ONE.eaf\` to \`BOA1010_FINAL_USE_THIS_ONE_v2_corrected.eaf\`?
- What happens when two annotators work on different copies?

*Software Carpentry (2024)*

---

## What is a version control system?

A **Version Control System (VCS)** records changes to a file repository over time.

Instead of keeping multiple copies of a file, it stores a **base version** and a **sequence of changes**:

\`\`\`
BOA1010 [base — initial transcription]
    │  commit a3f9c12  "initial ELAN transcription"
    ↓
BOA1010 + Δ1
    │  commit b7e2a41  "add UPOS tags tokens 1–20"
    ↓
BOA1010 + Δ1 + Δ2
    │  commit c1d8f33  "fix overlap annotation token 14"
    ↓
BOA1010 + Δ1 + Δ2 + Δ3          ← current state
\`\`\`

Any past version is reconstructible. Any change can be undone.
The **commit message is the rationale**, stored permanently alongside the change.

> "Version control is like an unlimited undo — and it also allows many people to work in parallel."
>
> — *Software Carpentry, Version Control with Git (2024)*

It allows a team to:

- Track *who* changed *what* and *when*
- Compare any two states of the project
- Revert to any previous state
- Work in parallel without conflicts

Version control is standard practice in software engineering.
It is still underused in linguistic annotation, despite the fact that **annotation is a form of collaborative software development**.

---

## Why not just use Track Changes?

The closest familiar tool is *Track Changes* in word processors. It fails for annotation work because:

| Limitation                        | Consequence for annotation                                         |
| --------------------------------- | ------------------------------------------------------------------ |
| History is **lost on acceptance** | Authorship and rationale vanish once changes are merged            |
| No **parallel branches**          | Collaborators must work sequentially or merge manually             |
| **Not plain-text friendly**       | Does not work with CoNLL-U, TSV, XML — the formats we actually use |
| No **programmatic access**        | You cannot run a validation script or trigger a conversion         |
| No **conflict detection**         | Two people editing the same span silently overwrite each other     |

> Track Changes is designed for a document that reaches a final state.
> A corpus is never final — it is a living artefact.

*Software Carpentry (2024)*

---

## Git: the most widely used VCS

**Git** is a distributed version control system.
Every contributor has a full copy of the repository history.

Key properties:

- **Free and open source**
- Works entirely on the command line — but has many GUI frontends
- Designed for plain text files → ideal for CoNLL-U, TSV, XML, Markdown
- Does not (necessarily) require a server — repositories live on your machine
- Integrates with hosting platforms: GitHub, GitLab, own server

*Created by Linus Torvalds in 2005 for Linux kernel development*

**GitHub** is a web-based hosting service for Git repositories.

---

## The five concepts you need -- and we'll go over during this tutorial

Everything in the Git/GitHub workflow reduces to five ideas:

1. **Repository** — the project and its full history
2. **Commit** — a timestamped snapshot with a message
3. **Branch** — a parallel working copy
4. **Pull request** — a proposal to merge, with review
5. **Action** — an automated script triggered by events

We will map each one to corpus annotation.

---

## Concept 1: Repository

A **repository** (repo) is a directory whose full history of changes is tracked by Git.

\`\`\`
my-corpus/
├── eaf/                        ← original ELAN transcriptions
│   ├── BOA1010.eaf
│   └── PSB054.eaf
├── pivot/                      ← maintained TSV representation
│   ├── BOA1010.tsv
│   └── PSB054.tsv
├── derived/                    ← formats generated from the pivot
│   ├── conllu/
│   │   ├── BOA1010.conllu
│   │   └── PSB054.conllu
│   ├── vert/
│   │   └── corpus.vert
│   └── jefferson/
│       └── BOA1010.txt
├── scripts/                    ← validation and conversion
│   ├── validate.py
│   ├── eaf_to_pivot.py
│   └── pivot_to_conllu.py
├── metadata/
│   └── speakers.tsv
└── README.md
\`\`\`

The repo stores:

- All annotation files (every version, forever)
- All processing scripts
- All metadata and documentation
- The complete record of every change ever made

## Exercise 1 — Create your first repository

\`\`\`bash
# 1. Create a project folder and enter it
mkdir my-corpus && cd my-corpus

# 2. Initialise a Git repository
git init

# 3. Check what Git sees
git status

# 4. Create and open a README file in VSCode
touch README.md
code README.md
# Add a line: "# My corpus", then save

# 5. Check status again — notice README is now "untracked"
git status
\`\`\`

**What to observe:**

- \`git init\` creates a hidden \`.git/\` folder — that is the entire history database
- \`git status\` reports which files Git knows about and which it does not
- An untracked file exists on disk but is invisible to Git until you \`git add\` it

## Local and remote repositories

In a distributed VCS, every collaborator has a **full copy** of the repository.
Git distinguishes two kinds:

- **Remote repo** — hosted on a server (GitHub, GitLab, institutional server); the shared reference point for the team
- **Local repo** — on your personal machine; where you actually do your work

The three operations that connect them:

\`\`\`
git clone <url>   # copy the remote repo to your machine — done once
git pull          # fetch the latest commits from remote into your local repo
git push          # send your local commits up to the remote
\`\`\`

\`\`\`
remote repo (GitHub)
      │  clone ↓        ↑ push / ↓ pull
      ├── Maria's local repo    (annotates BOA1010)
      └── Giulio's local repo   (annotates PSB054)
\`\`\`

Each annotator works locally and commits at their own pace.
Changes reach the shared remote only via an explicit \`push\`.

*Zeman, Savary & Guillaume (2024)*

Continuing from Exercise 1:

\`\`\`bash
# 1. Stage the README

# 2. Check status — README is now "staged"

# 3. Make your first commit
git commit -m "Initial commit: add README"

code README.md

git status
git diff README.md

**What to observe:**

- \`git diff\` shows exactly which lines changed before you stage them
- \`git log\` shows the commit hash, author, timestamp, and message
- After committing, the working directory is "clean" again

## Troubleshooting: "Please tell me who you are"

If \`git commit\` fails with an error like:

\`\`\`
Author identity unknown

*** Please tell me who you are.

Run

  git config --global user.email "you@example.com"
  git config --global user.name "Your Name"

Git needs to know who is making the commit. Run these **once** on your machine:

\`\`\`bash
git config --global user.email "your.email@example.com"
git config --global user.name "Your Name"

Use your real name and the email linked to your GitHub account.
After that, retry \`git commit\`.

## How a diff summarizes what changed

In Exercise 2 you opened \`README.md\` in VSCode and added a second line, then ran:

\`\`\`bash
git diff README.md
\`\`\`

Your README started as a single line:

\`\`\`
# My corpus
\`\`\`

After saving the file it has a second line:

\`\`\`
# My corpus
Spontaneous spoken Italian corpus
\`\`\`

\`git diff README.md\` collapses that to:

\`\`\`diff
@@ -1 +1,2 @@
 # My corpus
+Spontaneous spoken Italian corpus
\`\`\`

Lines with \`+\` were added. Unchanged context lines (no prefix) anchor the change in the file.
The \`@@\` header tells you the line numbers: the old file had 1 line starting at line 1; the new version has 2 lines.

---

## The four states of a file

Every file in a Git repository is in one of four states:

\`\`\`
[untracked]                         not known to Git
     │  git add
     ▼
[staged]         change selected, ready to be included in the next commit
     │  git commit
     ▼
[committed / unmodified]            safely stored in the Git database
     │  edit file
     ▼
[modified]       file changed on disk, but change not yet staged
     │  git add
     ▼
[staged] → ...
\`\`\`

Three areas a file moves through:

| Area              | Location               | Role                           |
| ----------------- | ---------------------- | ------------------------------ |
| Working directory | \`project/\`             | where you edit                 |
| Staging area      | \`project/.git/index\`   | what goes into the next commit |
| Git database      | \`project/.git/objects\` | permanent history              |

The staging step lets you commit **some** changes from your working directory while leaving others for a later commit — useful when one session touches multiple annotation files but only one is ready for review.

*Zeman, Savary & Guillaume (2024)*

---

## Concept 2: Commit

A **commit** records the state of one or more files at a specific point in time.

\`\`\`bash
git add annotations/BOA1010.conllu
git commit -m "Add UPOS tags for BOA1010, tokens 1-45"
\`\`\`

Each commit has:

- A **unique hash** (e.g. \`a3f9c12\`) — a 40-character hexadecimal checksum calculated from the contents of all tracked files; Git shortens it to the first 6–7 characters for display
- A **message** — the annotation rationale, in plain language
- A **diff** — exactly which lines changed
- **Author** and **timestamp**

→ The commit message *is* the annotation justification. It lives permanently in the history.

---

## What a diff looks like

From \`speech-matters-demo\`: an annotator fills in the missing dependency head and relation for token 19 (\`sì\`) in sentence \`BOD2018_138_139\`.

\`\`\`diff
 18  più   più   ADV   _  _  20  advmod    _  KID=138-17|Prolonged=Yes
-19  sì    sì    ADV   _  _  _   _         _  Clitic=Yes|KID=138-18
+19  sì    sì    ADV   _  _  20  discourse _  Clitic=Yes|KID=138-18
 20  anni  anno  NOUN  _  _  0   root      _  KID=138-19
\`\`\`

Column 7 is the head token; column 8 is the syntactic relation.
The commit message explains *why*: \`"sì at 138-18 is a discourse marker attached to root anni (20)"\`.

→ The diff + message together are a **permanent, auditable annotation decision**

This exercise uses **speech-matters-demo**, a pre-built repository with several commits already in it.

---

## Concept 3: Branch

A **branch** is a parallel instance of the repository.

\`\`\`
main branch (gold annotations, always valid)
    │
    ├── annotator/BOA1010        ← Maria's working copy
    ├── annotator/PSB054         ← Giulio's working copy
    └── fix/overlap-tokens       ← bug fix in progress
\`\`\`

Rules:

- \`main\` is always in a valid, releasable state
- Annotators work on their own branch — **nothing they do affects main**
- When work is ready, it is *proposed* for merging via a pull request

---

## Exercise 4 — Create and switch branches

\`\`\`bash
# 1. Create a new branch for annotation work
git checkout -b annotator/BOA1010

# 2. Check which branch you are on
git branch

# 3. Make a change on this branch — create and open a new file in VSCode
mkdir -p pivot

# Add a header line: token_id	speaker	form  (tab-separated), then save
git add pivot/BOA1010.tsv
git commit -m "Add BOA1010 pivot stub"

# 4. Switch back to main — the file you just added is not here
git checkout main
ls pivot/

# 5. Switch back to your branch — the file reappears
git checkout annotator/BOA1010
ls pivot/
\`\`\`

**What to observe:**

- \`git branch\` shows all branches; the current one is marked with \`*\`
- Switching branches changes the working directory — files appear and disappear
- \`main\` is unaffected by anything you do on your branch

---

## When two people edit the same file: conflicts

A **conflict** occurs when two collaborators modify the **same lines** of the same file independently,
and one tries to push after the other has already done so.

\`\`\`
Maria pushes commit 1  →  remote updated
Giulio tries to push commit 2  →  REJECTED: remote has commits Giulio doesn't have
    Giulio must first: git pull
    Git attempts automatic merge
    If the same lines were changed by both: CONFLICT — must be resolved manually
\`\`\`

What a conflict looks like inside the file:

\`\`\`diff
<<<<<<< HEAD  (Giulio's version)
1  e  e  CCONJ  _  _  3  cc    _  _
=======
1  e  e  PART   _  _  3  mark  _  _
>>>>>>> origin/main  (Maria's version)
\`\`\`

Giulio must choose one version (or write a combined one), remove the conflict markers, and commit.

**How the branch workflow prevents this**: annotators work on **separate branches**, usually on **separate files**. Conflicts only arise if two people touch the same token in the same file — which the branch + pull-request model makes rare and detectable before merge.

*Zeman, Savary & Guillaume (2024)*

---

## Concept 4: Pull request

A **pull request (PR)** is a proposal to merge a branch into \`main\`.

It is also a **collaborative space**:

1. Annotator opens a PR: *"I've annotated BOA1010, please review"*
2. Manager sees a visual diff of every changed line
3. Manager (or automated action) checks validation output
4. Discussion happens in threaded comments, **permanently recorded**
5. Manager either approves → merge, or requests changes → annotator revises

> The PR thread is the adjudication record.
> Every decision, every disagreement, every resolved ambiguity — preserved forever, publicly auditable.

---

## A pull request in practice

\`\`\`
PR #14 — Annotate BOA1010 tokens 1-45
Opened by: m.rossi · Branch: annotator/BOA1010

  ✓ Validation passed (validate.py)
  ✓ Visualization rendered (BOA1010-tree.pdf)

  Files changed: 1   +47 lines   -3 lines

  ── Review comment (g.bianchi, manager) ──────────────────
  Token 2 "quindi": I'd argue SCONJ not ADV here.
  See guideline §4.2. What do you think?

  ── Reply (m.rossi, annotator) ───────────────────────────
  You're right — checking §4.2. Will fix in next commit.

  [2 commits] [Approved] [Merged into main]
\`\`\`

---

## Concept 5: GitHub Actions

A **GitHub Action** is a script that runs automatically when a repository event occurs.

\`\`\`yaml
# .github/workflows/validate.yml
name: Validate CoNLL-U
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/validate.py annotations/
\`\`\`

Triggered on every commit or PR — no manual steps needed.

---

## Exercise 5 — Push and open a pull request on GitHub

\`\`\`bash
# 1. Push your branch to GitHub
git push -u origin annotator/BOA1010
\`\`\`

Then in the browser:

1. Go to your repository on GitHub
2. Click **"Compare & pull request"** (GitHub shows this automatically after a push)
3. Write a title: \`"Add BOA1010 pivot stub"\`
4. In the description, explain what you did and why
5. Click **"Create pull request"**

**What to observe:**

- The diff view shows exactly which lines were added or changed
- Comments are anchored to specific lines and preserved forever
- After merge, \`main\` contains your changes and the branch can be deleted

## No terminal required: the GitHub web editor

Everything in Exercises 3–5 is possible entirely from the browser — no \`git clone\`, no terminal.

| Action          | How                                                      |
| --------------- | -------------------------------------------------------- |
| Fork a repo     | Click **Fork** on any GitHub repo page                   |
| Create a branch | Branch dropdown → type name → **Create branch**          |
| Edit a file     | Click the pencil icon on any file                        |
| Commit          | Scroll to "Commit changes" at the bottom of the editor   |

| Review a PR     | **Files changed** tab → click \`+\` on any line to comment |
| Merge           | Click **Merge pull request**                             |

Useful for annotators who are new to version control — they can start contributing immediately without any local setup.

---

## Three actions for annotation workflows

| Action         | Triggered by    | What it does                                        |
| -------------- | --------------- | --------------------------------------------------- |
| **Validate**   | Every commit    | Checks annotation schema, flags malformed tokens    |
| **Visualize**  | Every commit    | Renders annotation as a readable PDF/SVG            |
| **Statistics** | Merge into main | Updates token counts, label distributions, progress |

→ Annotators get *instant feedback* without waiting for a reviewer
→ Reviewers see a *rendered tree*, not raw CoNLL-U
→ Project stats are always *up to date*

\`\`\`
MANAGER                          ANNOTATOR
──────────────────────────────────────────────────────
Creates stub files on main
  └── BOA1010.conllu (pre-tokenized)
                                 Creates working branch
                                   annotator/BOA1010
                                 Fills in annotations
                                 git commit → Actions fire
                                   ✓ validate
                                   ✓ visualize
                                 Opens pull request
Reviews diff + rendered tree
Leaves comments if needed
                                 Revises (new commits)
Approves → Merge

      └── main updated

## Already in use: Universal Dependencies

**Universal Dependencies** (UD) is the largest multilingual treebank collection in existence — 100+ languages, maintained by a global community.

UD uses GitHub for:

- Hosting all treebank repositories
- Discussing annotation guidelines (Issues)
- Tracking errors and corrections (Issues + PRs)
- Releasing versioned datasets (GitHub Releases + Zenodo)

> \`github.com/UniversalDependencies\` — 200+ repositories, thousands of contributors

---

## Monitoring the project: Issues and permalinks

Beyond commits and pull requests, GitHub provides two tools for tracking *what is happening and why*:

**Issues** — a structured discussion thread attached to the repository:

- Report an annotation error found after merge
- Raise a guideline ambiguity ("should overlap marker go on PKP019 or PKP014?")
- Track a decision to its resolution, with full comment history
- Link an issue to the commit or PR that fixed it — closes automatically on merge

**Permalinks** — a permanent URL pointing to a specific line or commit:

- \`github.com/.../BOA1010.conllu#L42\` → links to token 42 in the current file
- \`github.com/.../blob/<commit-hash>/BOA1010.conllu#L42\` → links to that line *as it was at that exact commit*

Together they make the project **auditable**: every annotation decision has a discussion thread; every discussion thread can point to the exact line of data it concerns; every line of data can be traced back to the commit that introduced it.

---

## What about the learning curve?

Annotators unfamiliar with Git face a real barrier. Mitigation strategies:

| Challenge                     | Solution                                                 |
| ----------------------------- | -------------------------------------------------------- |
| Command line is intimidating  | GitHub web editor — edit and commit from the browser     |
| Branch/merge concepts unclear | Visual tools: GitHub Desktop, VS Code Git panel          |
| YAML for Actions is complex   | Manager writes Actions once; annotators never touch them |
| Fear of breaking things       | Branches protect \`main\` — mistakes stay local            |

> The goal is not to turn linguists into software engineers.
> The goal is to give annotation projects **the same reliability guarantees** that software projects have.

---

## Requirements for a Git-friendly pivot format

A format suited to version control in Git must be:

- **Line-oriented** — each line is an atomic unit; diffs are human-readable
- **Tab-separated plain text** — no proprietary tool required to open it
- **One token per line** — one annotation change = one line changed
- **Self-documenting** — column headers describe each layer
- **Column-extensible** — new layers are added without modifying existing data
- **Invertible** — the original representation can be reconstructed from the pivot

> "The format is intentionally designed to support incremental correction and version-controlled maintenance: revisions are localised at the level of token identifiers and propagate deterministically to all derived formats."
>
> — Pannitto & Mauri (2025)

---

## The KIParla pivot format: vertical structure

One token per line. Each column is an annotation layer.

\`\`\`
token_id  speaker  tu_id  form      lemma     type        prosody          align            overlap
175-0     PKP019   175    eh        eh        linguistic  none             Begin=265.732    _
175-1     PKP019   175    (.)       [PAUSE]   shortpause  none             _                _
175-2     PKP019   175    se        se        linguistic  none             _                _
175-8     PKP019   175    [c~]      c~        linguistic  Interrupted=Yes  _                0-2(41)
175-12    PKP019   175    casotto   casotto   linguistic  none             End=268.952      _
176-0     PKP014   176    [sì       sì        linguistic  none             Begin=267.392    0-2(41)
176-2     PKP014   176    sì]       sì        linguistic  none             End=268.162      0-2(41)
177-0     PKP020   177    >fa       fa        linguistic  none             Begin=268.977    _
177-1     PKP020   177    vedere<   vedere    linguistic  none             End=269.497      _
\`\`\`

The overlap between TU 175 and TU 176 is encoded via the shared span reference \`0-2(41)\`. A diff on this file is immediately readable by a linguist.

---

## Why the vertical TSV is diff-friendly

\`\`\`diff
# Commit: "fix interrupted token 175-8: lemma should preserve tilde"

-175-8  PKP019  175  [c~]  c~   linguistic  Interrupted=Yes  _  0-2(41)
+175-8  PKP019  175  [c~]  c~:  linguistic  Interrupted=Yes  _  0-2(41)
\`\`\`

- The change affects **exactly one line**
- The reviewer sees **what changed and why** (in the commit message)
- The file history shows **every annotation decision over time**
- The same mechanism works for adding a new layer (new column)

Compare with a \`.eaf\` XML file: even a small change produces hundreds of unreadable diff lines.

---

## A three-level architecture

The KIParla pivot formalises three explicit levels:

\`\`\`
Level 1: TU (Transcription Unit)
  └── speaker-attributed segment, temporally anchored
        validation: coherent interval (end > start), non-empty content

Level 2: Span
  └── Jefferson phenomenon extending across a text sequence
        [overlap], °quiet voice°, >fast speech<
        validation: balanced delimiters, anchored to existing tokens

Level 3: Token
  └── lexical or para-verbal unit, locally well-formed
        validation: character inventory, categorical type, prosodic features
\`\`\`

Each level has **explicit validation criteria** → a GitHub Action can check them automatically on every commit.

---

## Column extensibility: adding a layer without breaking anything

The columnar format allows new annotation layers to be added without modifying the existing structure.

**Example: adding UD syntactic annotation**

Syntactic tokens that require expansion (multiword) are inserted with extended IDs (\`254-1a\`, \`254-1b\`) and marked as type \`syntactic\`. Two additional columns (\`lemma\`, \`upos\`) store the UD annotations.

\`\`\`
# Before: transcription only
token_id  speaker  form    type        jefferson_feats

254-1     PSB102   quindi  linguistic  _

# After: UD layer added as columns
token_id  speaker  form    type        jefferson_feats  lemma   upos
254-1     PSB102   quindi  linguistic  _                quindi  ADV
\`\`\`

→ Backward compatible: anyone not using the new columns simply ignores them.

## The pivot columns: transcription and token structure

| # | Column | Description |
|---|--------|-------------|
| 1 | \`token_id\` | Unique identifier within the conversation — format \`TU_ID-TOKEN_INDEX\` |
| 2 | \`speaker\` | Speaker code (e.g. \`BO118\`) — matches \`metadata/speakers.tsv\` |
| 3 | \`tu_id\` | Progressive identifier of the Transcription Unit |
| 4 | \`form\` | Jefferson transcription of the token, including all diacritics |
| 5 | \`lemma\` | Orthographic form — special symbols stripped; \`(.)\` → \`[PAUSE]\` |
| 6 | \`type\` | \`linguistic\` · \`shortpause\` · \`nonverbalbehavior\` · \`unknown\` · \`error\` |
| 7 | \`jefferson_feats\` | \`Intonation=\` · \`Interrupted=Yes\` · \`Truncated=Yes\` · \`Volume=\` · \`SpaceAfter=No\` |
| 8 | \`align\` | \`Begin=X.XXX\` / \`End=X.XXX\` in seconds — first/last token of TU only |
| 9 | \`prolongations\` | Colons encoded as \`<char_idx>x<count>\` — e.g. \`ese::mpio:\` → \`2x2,6x1\` |
| 10 | \`pace\` | \`Fast=START-END\` or \`Slow=START-END\` (char indices over \`form\`) |
| 11 | \`guesses\` | Uncertain spans from round brackets — \`START-END\` over \`form\` |
| 12 | \`overlaps\` | Simultaneous speech — \`START-END(GROUP_ID)\` — char indices over \`form\` |

*Pannitto & Mauri (2025)*

## The divergence: a pause that disappears

The pause \`(.)\` in TU 139 is a **first-class token** in the pivot:

\`\`\`
139-1  BO118  139  (.)  [PAUSE]  shortpause  _  _  _  _  _  _
\`\`\`

In the CoNLL-U it is **not a token** — UD trees require syntactically analysable nodes, and pauses are not. Instead it is encoded as a feature on the adjacent word:

\`\`\`
1  sì  sì  ADV  _  _  2  discourse  _  Begin=539.63|PauseAfter=Yes
\`\`\`

This is a principled decision, not an error. But it means the two files are **not directly comparable line by line**. A reviewer checking consistency must know the mapping rule: \`shortpause\` token in TSV → \`PauseAfter=Yes\` on the preceding token in CoNLL-U.

At scale — thousands of TUs, multiple pause types, overlapping spans — **this mapping cannot be done by eye**.

---

## Conversion scripts are not optional

The pivot-to-derived format mappings encode decisions about how phenomena are represented in each target format. Those decisions need to be:

- **Explicit** — written down as code, not tribal knowledge
- **Reproducible** — running the script twice on the same input gives the same output
- **Versioned** — the script lives in the repo alongside the data it transforms

\`\`\`
scripts/
├── eaf_to_pivot.py       # EAF → pivot (timestamps, overlap markers)
├── pivot_to_conllu.py    # pivot → CoNLL-U (pause folding, multiword expansion)
├── pivot_to_vert.py      # pivot → NoSketchEngine vertical
└── validate_tsv.py       # format correctness checks
\`\`\`

When a correction is made to the pivot, re-running \`pivot_to_conllu.py\` rebuilds the CoNLL-U with the fix applied — **consistently, automatically, and with no manual patching**. The script is the specification. The Git history of the script is the history of those decisions.

## From EAF to pivot: the curation workflow

\`\`\`
ELAN (.eaf)
    │
    ▼  validation pipeline (Python)
    │   ├── TU validation (temporal coherence)
    │   ├── Span validation (delimiter balancing)
    │   └── Token validation (character inventory, types)
    │
    ▼  pivot format (.tsv)          ← maintained in Git
    │
    ├──► CoNLL-U (.conllu)          ← reproducible derived format
    ├──► re-exported ELAN (.eaf)    ← reproducible derived format
    ├──► NoSketchEngine (.vert)     ← reproducible derived format
    └──► KIParla Forest (treebank)  ← reproducible derived format
\`\`\`

Derived formats are *regenerated* from the pivot — not maintained separately.

---

## The linguist still works in ELAN

The pivot architecture does not require linguists to abandon their tools.
**ELAN remains the annotation interface** — the pivot is the *storage and versioning* format.

The conversion from EAF to pivot can happen at two points:

\`\`\`
LINGUIST'S LAPTOP                     SHARED REPOSITORY (GitHub)
─────────────────────────────────     ──────────────────────────────────
Works in ELAN as usual
Saves .eaf locally

Option A — local conversion:
  runs eaf_to_pivot.py
  reviews pivot diff
  git add + git commit + git push  →  pivot arrives already validated

Option B — push and let Actions run:
  git add + git commit + git push  →  Action: eaf_to_pivot.py
                                       Action: validate pivot
                                       Action: commit pivot to repo
\`\`\`

Both paths produce the same outcome: **the pivot in the shared repo is always the authoritative, validated version**.
Linguists who are comfortable with the command line can run the conversion locally and review the diff before pushing; those who are not can push the EAF and let the Action handle it.

The EAF files can be kept in the repo too — in \`eaf/\` — for reference and reproducibility, but they are **not** what Git is tracking for annotation changes.

## The value of history tracking

With Git, the corpus history is itself a research artefact.

\`\`\`bash
# Who touched the pivot TSV and when?
git log --oneline -- pivot/BOD2018.tsv
# 18b5167 fix two errors in pivot TSV
# 357d17b Initial commit: BOD2018 exercise stubs (TU 138–145)

# What exactly changed in the last commit to that file?
git show 18b5167 -- pivot/BOD2018.tsv

# When was the POS for 'si' corrected — and why?
git log -S "INTJ" --oneline -- conllu/BOD2018.conllu
# 5c78119 fix POS for si and quindi per KIParla spoken Italian guidelines

\`\`\`

Any annotation decision is recoverable: who made it, when, and why.

## Documentation grounded in the data

A persistent problem in corpus linguistics: documentation claims drift from the actual data.

> "Overlap is encoded with square brackets" — but is it, in every file, in every version?

With Git, documentation can be **derived from and verified against** the history:

\`\`\`bash
# Auto-generate a dated changelog from commit messages
git log --format="%ad  %s" --date=short -- pivot/
# 2026-05-21  fix two errors in pivot TSV
# 2026-05-21  remove Clitic=Yes from CoNLL-U misc fields
# 2026-05-21  add speaker and conversation metadata for BOD2018
# 2026-05-21  Initial commit: BOD2018 exercise stubs (TU 138–145)

# Who contributed what — for an Acknowledgements section
git shortlog -sn
#     12  Maria Rossi
#      7  Giulio Bianchi
#      3  ellepannitto

# Trace every line of a file back to the commit that introduced it
git blame pivot/BOD2018.tsv
\`\`\`

A release's README does not need to say "we fixed X in version 1.1" as a free-text claim — it can link to the commit that proves it.

→ The changelog **is** the commit log. The attribution **is** the author list.
Documentation that cannot be falsified by \`git log\` is not documentation.

---

## Versions and releases: corpora as software

Git supports an explicit release model with *tags*:

\`\`\`bash
# Create a version
git tag -a v1.1.0 -m "Add ParlaBO module; fix overlap encoding in KIP"
git push origin v1.1.0
\`\`\`

On GitHub, a tag automatically creates a **Release** with:

- A changelog generated from commits
- A downloadable archive (\`.zip\`, \`.tar.gz\`) of the corpus at that version
- A link to Zenodo for a permanent DOI

→ Every corpus version is **citable**, **reproducible**, and **comparable** with previous ones.
